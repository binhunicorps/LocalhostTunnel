name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.0.16)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve Version
        id: version
        shell: pwsh
        run: |
          $resolvedVersion = ""
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $resolvedVersion = "${{ github.event.inputs.version }}"
          }
          else {
            $resolvedVersion = "${{ github.ref_name }}"
          }

          $resolvedVersion = $resolvedVersion.Trim()
          if ($resolvedVersion.StartsWith("v")) {
            $resolvedVersion = $resolvedVersion.Substring(1)
          }

          if ([string]::IsNullOrWhiteSpace($resolvedVersion)) {
            throw "Version is empty."
          }

          "value=$resolvedVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build and Test
        shell: pwsh
        run: |
          dotnet build LocalhostTunnel.sln -c Release -v minimal
          dotnet test LocalhostTunnel.sln -c Release --no-build -v minimal

      - name: Publish Release Artifacts
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/publish-desktop.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Localhost Tunnel v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            artifacts/release/LocalhostTunnel-Portable-win-x64-v${{ steps.version.outputs.value }}.zip
